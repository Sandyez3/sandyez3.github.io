<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --teal:#29A8A3; --teal-dk:#1b7e7a; --teal-xdk:#104c49;
  --teal-lt:#d0f0ee; --teal-xlt:#edfaf9; --purple:#6B5AB8;
  --purple-dk:#4e3f8e; --purple-lt:#e2ddf5; --purple-xlt:#f2f0fc;
  --grad:linear-gradient(90deg,#29A8A3 0%,#6B5AB8 100%);
  --grad-v:linear-gradient(145deg,#29A8A3 0%,#6B5AB8 100%);
  --bg:#f7f8fc; --white:#ffffff; --text:#0d1a2a;
  --text-2:#1e2e40; --text-3:#3a5060; --border:#dde4f0;
}
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:18px; font-weight:400; line-height:1.75; }
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0.4rem 3.5rem; background:rgba(255,255,255,0.97);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
  box-shadow:0 1px 16px rgba(0,0,0,0.07);
}
.nav-logo img { height:110px; display:block; }
.nav-links { display:flex; gap:2rem; align-items:center; }
.nav-links a { font-family:'Space Mono',monospace; font-size:0.85rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-3); text-decoration:none; transition:color 0.2s; }
.nav-links a:hover { color:var(--teal); }
.nav-links a.active { color:var(--teal); font-weight:700; }
.nav-cta { background:var(--grad) !important; color:#fff !important; padding:0.55rem 1.4rem; border-radius:4px; font-weight:700 !important; transition:opacity 0.2s !important; }
.nav-cta:hover { opacity:0.85 !important; }
.btn { font-family:'Space Mono',monospace; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; padding:1rem 2.2rem; border-radius:4px; text-decoration:none; display:inline-block; transition:all 0.18s; border:none; cursor:pointer; white-space:nowrap; }
.btn-grad { background:var(--grad); color:#fff; box-shadow:0 4px 16px rgba(41,168,163,0.22); }
.btn-grad:hover { opacity:0.88; transform:translateY(-2px); }
section { padding:6rem 3.5rem; }
.max-w { max-width:1100px; margin:0 auto; }
.section-label { font-family:'Space Mono',monospace; font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.9rem; display:flex; align-items:center; gap:0.65rem; }
.grad-text { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.grad-line { display:inline-block; width:2.8rem; height:2px; background:var(--grad); border-radius:1px; flex-shrink:0; }
h1 { font-family:'DM Serif Display',serif; font-size:clamp(2.4rem,4vw,3.6rem); line-height:1.15; color:var(--text); margin-bottom:1.4rem; }
h2 { font-family:'DM Serif Display',serif; font-size:clamp(2rem,3vw,2.85rem); color:var(--text); line-height:1.2; margin-bottom:1.4rem; margin-top:2rem; }
h2:first-of-type { margin-top:0; }
p { color:var(--text-2); margin-bottom:1.1rem; }
p:last-of-type { margin-bottom:0; }
.intro-section { background:var(--white); border-top:1px solid var(--border); padding-top:10rem; padding-bottom:0; }
.main-section { background:var(--white); padding-top:3rem; }
.use-case-list { display:flex; flex-direction:column; gap:0.75rem; margin:1.5rem 0 2.5rem; }
.use-case-item { display:flex; align-items:flex-start; gap:0.85rem; font-size:1rem; color:var(--text-2); }
.uc-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:0.45rem; background:var(--grad); }
.divider-section { background:var(--bg); border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:3rem 3.5rem; text-align:center; }
.divider-section p { font-family:'Space Mono',monospace; font-size:0.82rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-3); margin:0; }
.use-case-section { background:var(--grad-v); padding:6rem 3.5rem; color:#fff; }
.use-case-section h2 { color:#fff; margin-top:0; }
.use-case-section h3 { font-family:'DM Serif Display',serif; color:#fff; line-height:1.2; margin-bottom:0.5rem; }
.use-case-section .eyebrow { font-family:'Space Mono',monospace; font-size:0.8rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.65); margin-bottom:1rem; }
.use-case-section p { color:rgba(255,255,255,0.88); margin-bottom:1.1rem; }
.use-case-section p:last-of-type { margin-bottom:0; }
.uc-block { background:rgba(255,255,255,0.1); border-radius:12px; padding:2rem 2.5rem; margin-top:2.5rem; }
.uc-block h3 { color:#fff; margin-top:0; margin-bottom:0.75rem; }
footer { background:#ffffff; padding:1.6rem 3.5rem; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); }
.footer-logo img { height:72px; display:block; }
footer p { font-size:0.78rem; color:var(--text-3); margin:0; }
@media(max-width:900px) {
  nav { padding:0.4rem 1.5rem; }
  .nav-links { display:none; }
  section { padding:4rem 1.5rem; }
  .intro-section { padding-top:8rem; }
  .divider-section { padding:2rem 1.5rem; }
  footer { flex-direction:column; gap:1rem; text-align:center; padding:2rem; }
}

/* Hamburger nav */
.nav-hamburger { display:none; flex-direction:column; justify-content:space-between; width:24px; height:18px; background:none; border:none; cursor:pointer; padding:0; flex-shrink:0; }
.nav-hamburger span { display:block; width:100%; height:2px; background:var(--text); border-radius:2px; transition:all 0.25s; }
.nav-hamburger.open span:nth-child(1) { transform:translateY(8px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity:0; }
.nav-hamburger.open span:nth-child(3) { transform:translateY(-8px) rotate(-45deg); }
@media(max-width:900px) {
  .nav-logo img { height:72px; }
  .nav-hamburger { display:flex; }
  .nav-links { display:none; position:absolute; top:100%; left:0; right:0; background:rgba(255,255,255,0.98); backdrop-filter:blur(10px); flex-direction:column; align-items:flex-start; padding:1.5rem 1.5rem 2rem; gap:1.2rem; border-bottom:1px solid var(--border); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
  .nav-links.open { display:flex !important; }
  .nav-links a { font-size:1rem; padding:0.35rem 0; }
  .btn { display:block; width:100%; text-align:center; box-sizing:border-box; }
  .cta-row { flex-direction:column; }
  .uc-block { padding:1.5rem; }
}
/* Standard typography - consistent across all pages */
h3 { font-family:'DM Serif Display',serif; font-size:1.5rem; line-height:1.3; margin-bottom:1rem; }
h4 { font-family:'Space Mono',monospace; font-size:1.1rem; font-weight:700; line-height:1.4; margin-bottom:0.5rem; }
p { font-size:1.1rem; color:var(--text-2); }
.use-case-item { font-size:1.1rem; }

    <h1>Your patients trusted you with their data. NexusRWE makes sure it stays that way.</h1>
    <p>Pharma sponsors need access to real-world patient data. Your CIO, legal, and compliance teams have always said no. HIPAA exposure, breach risk, and reputational concerns outweigh the modest payments offered. NexusRWE changes that equation. Studies run inside your walls. Nothing leaves.</p>

  <div class="max-w">
    <h2>Join the network. Keep your data.</h2>
    <p>Traditional data partnerships require hospitals to export patient records, accept ongoing legal exposure, and get paid based on how many records left the building. NexusRWE flips that model entirely.</p>

    <h2>Where NexusRWE creates value for hospitals:</h2>
    <div class="use-case-list">
      <div class="use-case-item"><span class="uc-dot"></span><div><strong>Participate without exporting data</strong> - Approved studies run locally inside a secure environment at your site.</div></div>

      <div class="use-case-item"><span class="uc-dot"></span><div><strong>Get compensated for compute, not records</strong> - Revenue tied to a service you actually provide.</div></div>

<section class="use-case-section">
  <div class="max-w">
    <p class="eyebrow">Use Case 2 &middot; Without Exporting Patient Data</p>
    <h3>A Hospital Participates in RWE</h3>

    <div class="uc-block">
      <h3>What this looks like in practice</h3>
      <p>A regional academic medical center has 1.2 million patient records and a strong clinical informatics team. Pharma sponsors regularly ask about data partnerships. The CIO, legal, and compliance teams consistently say no. HIPAA exposure, breach risk, and reputational concerns outweigh the modest payments offered.</p>
    </div>

    <div class="uc-block">
      <h3>The old way</h3>
      <p>Sign a data use agreement. Export de-identified patient records to a sponsor or data aggregator. Hope the de-identification holds. Accept ongoing legal exposure for years. Get paid based on how many patient records left the building.</p>
    </div>

    <div class="uc-block">
      <h3>With NexusRWE</h3>
      <p>The hospital onboards once with a standard governance configuration. Sponsors submit locked study protocols. Because no patient data ever leaves, the traditional approval burden largely falls away. IRB review, HIPAA business associate agreements, and ongoing breach exposure are no longer part of the equation. The CIO, legal, and compliance teams review scope and resource allocation, not patient privacy risk. Approved studies run locally inside a secure, isolated environment. Only aggregate, privacy-protected results leave. Nothing else. The hospital is compensated for compute resources, not patient records.</p>
    </div>

    <div class="uc-block">
      <h3>The outcome</h3>
      <p>The hospital participates in regulatory-grade studies it previously had to decline. Data sovereignty is structural, not just promised. Compensation is tied to a service the hospital actually provides, not to the volume of patient data exported.</p>
    </div>
  </div>
</section>

<script>
function toggleNav(){var l=document.querySelector('.nav-links'),b=document.querySelector('.nav-hamburger');l.classList.toggle('open');b.classList.toggle('open');}
